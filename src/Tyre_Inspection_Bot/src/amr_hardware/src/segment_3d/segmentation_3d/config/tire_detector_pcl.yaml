# Point-cloud tire fallback detector parameters.
# Used when pcl_fallback_enabled=true in segment_3d launch.

tire_detector_pcl_node:
  ros__parameters:
    vehicle_boxes_topic: "/aurora_semantic/vehicle_bounding_boxes"
    point_cloud_topic: "/segmentation_processor/registered_pointcloud"
    output_topic: "/tire_bounding_boxes_pcl_fallback"
    target_frame: "slamware_map"

    # ROI: expand each vehicle box by this margin for tire search
    roi_expansion_m: 0.2

    # Height filter: tire band above ground (m)
    tire_z_min_m: 0.0
    tire_z_max_m: 0.6

    # Voxel downsampling (jackal_3d_slam pattern)
    voxel_leaf_size_m: 0.015

    # DBSCAN clustering (UniGoal pattern)
    dbscan_eps: 0.08
    dbscan_min_points: 25

    # Tire-like filter: cluster must have point count in range
    tire_min_points: 30
    tire_max_points: 500

    # Tire-like filter: x,y extent (tire diameter ~0.2-0.5 m)
    tire_min_extent_m: 0.15
    tire_max_extent_m: 0.55

    # Process rate (Hz); 2-5 Hz typical to limit CPU
    # Tuned 2026-03: 3.0->2.0 for Jetson; reduces PCL processing load
    process_rate_hz: 2.0

tire_merger_node:
  ros__parameters:
    yolo_topic: "/darknet_ros_3d/tire_bounding_boxes"
    pcl_fallback_topic: "/tire_bounding_boxes_pcl_fallback"
    output_topic: "/tire_bounding_boxes_merged"
    # Seconds without YOLO before fallback to PCL. 0.5 = prefer PCL when YOLO slow (CPU) or missing; reduces false captures.
    yolo_stale_s: 0.5
    log_fallback_usage: true
    # EMA smoothing (perception_stability_report): reduces centroid jitter. Set true for edge cases.
    smoothing_enabled: false
    ema_alpha: 0.3
