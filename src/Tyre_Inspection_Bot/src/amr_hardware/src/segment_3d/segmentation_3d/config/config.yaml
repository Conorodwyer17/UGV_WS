# segment_3d configuration - best_fallback.pt class "wheel" (id=22); see docs/BEST_FALLBACK_MODEL_CLASSES.md
segmentation_processor_node:
  ros__parameters:
    # Default; segment_3d.launch overrides per processor: vehicle -> vehicle_bounding_boxes, tire -> tire_bounding_boxes
    output_bbx3d_topic: "/darknet_ros_3d/tire_bounding_boxes"
    # Tire processor uses wheel; model outputs "wheel"; aliases kept for compatibility
    interested_classes: ["car", "truck", "bus", "wheel", "tire", "tyre", "car_tire", "car_tyre", "car-tire"]
    # Use camera-aligned depth-based point cloud (from depth_to_registered_pointcloud_node)
    # Aurora: /slamware_ros_sdk_server_node/point_cloud is unorganized SLAM map points, not camera-aligned
    point_cloud_topic: "/segmentation_processor/registered_pointcloud"
    working_frame: "slamware_map"  # Match inspection_manager world_frame and Aurora map
    minimum_probability: 0.65
    min_valid_points: 3  # Allow smaller wheel clusters
    min_valid_points_wheel: 2
    wheel_cluster_tolerance: 0.18
    wheel_max_distance_m: 12.0
    tf_max_age_ms: 250  # Phase D: reject frames when transform age exceeds this (ms)
    # Segment indices from YOLO are in RGB image size; point cloud is depth size (416x224). Scale accordingly.
    segment_image_width: 640   # /slamware_ros_sdk_server_node/left_image_raw width
    segment_image_height: 480  # /slamware_ros_sdk_server_node/left_image_raw height
    # voxel_leaf_size: 0 = adaptive; 0.02-0.05 typical for vehicle-sized objects (best_practices_matrix)
    # Tuned 2025-03: 0.02 overrides adaptive for faster clustering on Jetson
    voxel_leaf_size: 0.02
    # Statistical outlier removal (OpenNav pattern); reduces noisy 3D boxes from depth artifacts
    sor_enabled: true
    sor_nb_neighbors: 5
    sor_std_ratio: 2.0
