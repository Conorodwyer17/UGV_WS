# Legacy: SGBM stereo params for aurora_sdk_bridge (use_bridge=true, classic Aurora).
# Default is Aurora 2.11 native depth (use_bridge=false); bridge only used for pre-2.11 devices.
# Loaded by aurora_sdk_bridge.launch.py.
aurora_sdk_bridge:
  ros__parameters:
    num_disparities: 160   # PRODUCTION_CONFIG: stereo_num_disparities (must be divisible by 16)
    block_size: 11         # PRODUCTION_CONFIG: stereo_block_size
    min_disparity: 0
    # speckle_window_size 100, speckle_range 32 are fixed in bridge node (match PRODUCTION_CONFIG)
